<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exemplo — Glide — Galeria de Viagens</title>
  <script src="https://unpkg.com/@fiddle-digital/string-tune@1.1.53/dist/index.js"></script>
  <style>
@property --progress {
  syntax: '<number>';
  inherits: true;
  initial-value: 0;
}

@property --spotlight-angle {
  syntax: '<number>';
  inherits: true;
  initial-value: 0;
}

@property --spotlight-distance {
  syntax: '<number>';
  inherits: true;
  initial-value: 0;
}

:root {
  --vh: 1vh;
  --vw: 1vw;
  --c-white: #ffffff;
  --c-black: #000000;
  --c-black-rgb: 0, 0, 0;
  --c-grey-dark: #333333;
  --c-grey-dark-rgba: 51, 51, 51;
  --c-grey: #999999;
  --c-red: #FF5A37;

  --easing-function: cubic-bezier(0.86, 0, 0.31, 1);
  --easing-function-2: cubic-bezier(0.35, 0.35, 0, 1);
  --easing-timing: 1.5s;

  --g-gap: 0.4rem;
  --g-margin: calc(var(--g-gap) * 2);

  --mm: 0.64rem;
  --m: 0.8rem;
  --p: 1rem;
  --h6: 1.25rem;
  --h5: 1.563rem;
  --h4: 1.953rem;
  --h3: 2.441rem;
  --h2: 3.052rem;
  --h1: 3.815rem;
  --h0: 5.065rem;
  --large: max(6.331rem, 18vw);
}
@media (min-width: 1024px) {
  :root {
    --g-margin: calc(var(--g-gap) * 4);
  }
}

html,
body,
* {
  margin: 0;
  padding: 0;
}

html {
  font-size: 16px;
  line-height: 1.25;
  font-family: Arial, Helvetica, sans-serif;
  background-color: #808080;
  color: black;
}
.-w {
  margin-left: var(--g-margin);
  margin-right: var(--g-margin);
}
@media (min-width: 1024px) {
  html {
    font-size: 20px;
  }
}
body {
  position: relative;
  min-height: 100lvh;
}
.note {
  color: var(--c-white);
}
img {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.-w {
  display: grid;
  grid-template-columns: repeat(14, 1fr);
  column-gap: var(--g-gap);
  position: relative;

  @media (min-width: 1024px) {
    padding-bottom: calc(var(--vh, 1vh) * 80);
  }
}
.-w .note {
  grid-column-start: 1;
  grid-column-end: 15;
  grid-row-start: 1;
  justify-self: center;
  align-self: start;
  text-align: center;
  z-index: 40;
  margin-top: var(--h0);
  background-color: var(--c-black);
}
.-w p {
  grid-column-start: 3;
  grid-column-end: 13;
  grid-row-start: 1;
  justify-self: center;
  align-self: start;
  text-align: center;
  z-index: 40;
  margin-top: calc(var(--h1) * 2);
  padding-left: 10%;
  padding-right: 10%;
  color: var(--c-white);

  @media (min-width: 1024px) {
    grid-column-start: 6;
    grid-column-end: 10;
  }
}

.-w figure {
  grid-row-start: 2;
  margin-top: calc(var(--vh, 1vh) * 10);
  transform: translateZ(0);
  clip-path: inset(0% 0% 0% 0%);
}
.-w .image-1 {
  grid-column-start: 1;
  grid-column-end: 3;

  @media (min-width: 1024px) {
    grid-column-start: 3;
    grid-column-end: 5;
  }
}
.-w .image-2 {
  grid-column-start: 3;
  grid-column-end: 6;

  @media (min-width: 1024px) {
    grid-column-start: 5;
    grid-column-end: 7;
  }
}
.-w .image-3 {
  grid-column-start: 6;
  grid-column-end: 10;

  @media (min-width: 1024px) {
    grid-column-start: 7;
    grid-column-end: 9;
  }
}
.-w .image-4 {
  grid-column-start: 10;
  grid-column-end: 13;

  @media (min-width: 1024px) {
    grid-column-start: 9;
    grid-column-end: 11;
  }
}
.-w .image-5 {
  grid-column-start: 13;
  grid-column-end: 15;

  @media (min-width: 1024px) {
    grid-column-start: 11;
    grid-column-end: 13;
  }
}

.footer-note {
  text-align: center;
  padding: var(--h3) var(--g-margin);
  color: var(--c-grey);
  font-size: var(--mm);
}
.footer-note a { color: #8b5cf6; text-decoration: none; }
</style>
</head>

<body>
  <div class="-w">
  <span class="note -mm -up -tac">Scroll para ver o efeito glide</span>
  <p>Destinos que inspiram. Momentos que ficam.</p>

  <figure class="image-1" string="glide" string-glide="1.0">
    <img string="lazy" string-lazy="https://images.unsplash.com/photo-1506929562872-bb421503ef21?w=500&q=80" alt="Praia">
  </figure>
  <figure class="image-2" string="glide" string-glide="0.5">
    <img string="lazy" string-lazy="https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=500&q=80" alt="Montanha">
  </figure>
  <figure class="image-3" string="glide" string-glide="0.0">
    <img string="lazy" string-lazy="https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?w=500&q=80" alt="Lago">
  </figure>
  <figure class="image-4" string="glide" string-glide="0.5">
    <img string="lazy" string-lazy="https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=500&q=80" alt="Floresta">
  </figure>
  <figure class="image-5" string="glide" string-glide="1.0">
    <img string="lazy" string-lazy="https://images.unsplash.com/photo-1472214103451-9374bd1c798e?w=500&q=80" alt="Campo">
  </figure>
</div>

  <footer class="footer-note">
    Exemplo — Glide via <a href="https://string-tune.fiddle.digital/skill-hub/basics/05-glide" target="_blank">StringTune</a>
    | Valores: 0.0 (sem glide) a 1.0 (maximo)
  </footer>

  <script>
    const stringTune = StringTune.StringTune.getInstance();
    window.StringTuneContext = stringTune;
    stringTune.use(StringTune.StringLazy);
    stringTune.use(StringTune.StringGlide);
    stringTune.start(0);
  </script>
</body>

</html>
