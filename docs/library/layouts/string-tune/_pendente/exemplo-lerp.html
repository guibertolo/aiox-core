<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exemplo — Lerp — Distorcao de Imagem por Scroll</title>
  <script src="https://unpkg.com/@fiddle-digital/string-tune@1.1.53/dist/index.js"></script>
  <style>
@property --progress { syntax: '<number>'; inherits: true; initial-value: 0; }
@property --spotlight-angle { syntax: '<number>'; inherits: true; initial-value: 0; }
@property --spotlight-distance { syntax: '<number>'; inherits: true; initial-value: 0; }

:root {
  --vh: 1vh; --vw: 1vw;
  --c-white: #ffffff; --c-black: #000000; --c-black-rgb: 0, 0, 0;
  --c-grey-dark: #333333; --c-grey: #999999;
  --easing-function: cubic-bezier(0.86, 0, 0.31, 1);
  --easing-function-2: cubic-bezier(0.35, 0.35, 0, 1);
  --g-gap: 0.4rem; --g-margin: calc(var(--g-gap) * 2);
  --mm: 0.64rem; --m: 0.8rem; --p: 1rem;
  --h6: 1.25rem; --h5: 1.563rem; --h4: 1.953rem;
  --h3: 2.441rem; --h2: 3.052rem; --h1: 3.815rem; --h0: 5.065rem;
  --large: max(6.331rem, 18vw);
}
@media (min-width: 1024px) { :root { --g-margin: calc(var(--g-gap) * 4); } }
html, body, * { margin: 0; padding: 0; }
html { font-size: 16px; line-height: 1.25; font-family: Arial, Helvetica, sans-serif; background-color: #808080; color: black; }
@media (min-width: 1024px) { html { font-size: 20px; } }
body { position: relative; min-height: 100lvh; }
img { display: block; width: 100%; height: 100%; object-fit: cover; }
.note { color: var(--c-white); }

.-w {
  margin-left: var(--g-margin); margin-right: var(--g-margin);
  display: grid; grid-template-columns: repeat(14, 1fr);
  align-items: end; column-gap: var(--g-gap);
  position: relative; height: calc(var(--vh, 1vh) * 80);
}
.-w .note {
  grid-column-start: 1; grid-column-end: 15; grid-row-start: 1;
  justify-self: center; align-self: start; text-align: center;
  z-index: 40; margin-top: var(--h0); background-color: var(--c-black);
}
.-w .image-1 {
  grid-column-start: 1; grid-column-end: 15; grid-row-start: 1;
  overflow: hidden;
}
.-w .title {
  grid-column-start: 3; grid-column-end: 15; grid-row-start: 1;
  align-self: end; position: relative;
  margin-bottom: calc(var(--vh, 1vh) * 5);
  color: var(--c-white); font-size: var(--h1); font-weight: 300;
}

@media (min-width: 1024px) {
  .-w {
    min-height: 1024px;
    height: min(calc(var(--vh, 1vh) * 80), calc(var(--vw, 1lvw) * 80));
    padding-bottom: calc(var(--vh, 1vh) * 80);
  }
  /* Lerp distorce a imagem via clip-path baseado na velocidade do scroll */
  .-w .image-1 {
    grid-column-start: 5; grid-column-end: 11;
    transform: translateZ(0);
    clip-path: polygon(
      max(calc(var(--lerp) * 0.25%), 0%) max(calc(var(--lerp) * 0.25%), 0%),
      min(calc(100% - var(--lerp) * -0.25%), 100%) max(calc(var(--lerp) * -0.25%), 0%),
      min(calc(100% - var(--lerp) * 0.25%), 100%) min(calc(100% - var(--lerp) * 0.25%), 100%),
      max(calc(var(--lerp) * -0.25%), 0%) min(calc(100% - var(--lerp) * -0.25%), 100%)
    );
  }
  /* Scale baseado na velocidade */
  .-w .image-1 img {
    scale: calc(1 + min((var(--lerp) * var(--lerp) * 0.0001), 1));
  }
  .-w .title { grid-column-start: 3; }
}

.footer-note {
  text-align: center; padding: var(--h3) var(--g-margin);
  color: var(--c-grey); font-size: var(--mm);
}
.footer-note a { color: #8b5cf6; text-decoration: none; }
</style>
</head>
<body>
  <div class="-w">
    <span class="note -mm">Scroll rapido para ver a distorcao (desktop only)</span>
    <figure class="image-1" string="lerp">
      <img string="lazy" string-lazy="https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=800&q=80" alt="Loja">
    </figure>
    <span class="title">Velocidade cria forma</span>
  </div>

  <footer class="footer-note">
    Exemplo — Lerp via <a href="https://string-tune.fiddle.digital/skill-hub/" target="_blank">StringTune</a>
    | --lerp muda com a velocidade do scroll, distorcendo clip-path e scale
  </footer>

  <script>
    const stringTune = StringTune.StringTune.getInstance();
    window.StringTuneContext = stringTune;
    stringTune.use(StringTune.StringLazy);
    stringTune.use(StringTune.StringLerp);
    stringTune.start(0);
  </script>
</body>
</html>
