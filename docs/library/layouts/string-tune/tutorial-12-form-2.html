.-w {
  display: grid;
  grid-template-columns: repeat(14, 1fr);
  align-items: center;
  column-gap: var(--g-gap);

form {
  grid-row-start: 1;
  grid-row-end: 2;

  grid-column-end: 14;

  position: relative;
  background-color: #FFD23F;
  color: var(--c-black);

  margin-bottom: calc(var(--h1) * 2);

  width: 100%;
  padding-top: var(--p);
  padding-bottom: var(--p);
  display: grid;
  grid-template-columns: repeat(1, 1fr);
  column-gap: var(--g-gap);
}
fieldset {
  margin: 0;
  padding: var(--g-gap);
  border: none;
  position: relative;
  padding-bottom: var(--h6);

input,
textarea {
  padding: var(--g-gap);
  display: block;
  width: 100%;
  border: none;
  background-color: #E6B72E;
  color: var(--c-black);
  outline: none;
  border-radius: 0;
  box-shadow: none;
}
input::placeholder,
textarea::placeholder {

}
fieldset:has(input[type='checkbox']) {
  display: flex;
  align-items: baseline;

}

input.-error,

}

input.-valid,

fieldset[string-input^='group'].-error label::after {

  color: var(--c-red);

fieldset[string-input^='error'] span {
}
.-invalid div[string-input^='error'],
.-error div[string-input^='error'] {

  top: calc(100% - var(--h6));
  left: var(--g-gap);
  background-color: var(--c-white);
  border-radius: 0.2rem;
  padding: 0 var(--g-gap);
  box-shadow: 0 0.2rem 0.4rem #00000020;
}
.-invalid div[string-input^='error'] span,
.-error div[string-input^='error'] span {
  display: block;
  font-size: 0.6rem;
}
.-invalid div[string-input^='error'] span::before,
.-error div[string-input^='error'] span::before {
  content: '•';
  margin-right: var(--g-gap);
}
.-invalid div[string-input^='error'] span::after,
.-error div[string-input^='error'] span::after {
  content: ';';
}
.-invalid div[string-input^='error'] span:last-child::after,
.-error div[string-input^='error'] span:last-child::after {
  content: '.';
}
.-invalid div[string-input^='error'] span {
  color: #C99A1F;
}
.-error div[string-input^='error'] span {

.popup {
  position: fixed;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  overflow: auto;
  background-color: var(--c-white);
  color: var(--c-black);
  padding: var(--g-gap);
  
  visibility: hidden;
}
.popup code {
}
.popup.-opened {
  visibility: visible;
}

<body>
  <div class="-w">
  <form string="form" string-id="validation-demo" id="validation-demo">
    <fieldset string-input="group[full_name]">
      <label for="username">Full name</label>
      <input type="text" name="full_name" string-id="full_name" id="full_name" string-input="required|min(2)" placeholder="Only letters, numbers, dash, underscore" />
      <div string-input="error[full_name]"></div>
    </fieldset>
    <fieldset string-input="group[website]">
      <label for="website">Website</label>
      <input type="text" name="website" string-id="website" id="website" string-input="url" placeholder="Enter a valid URL" />
      <div string-input="error[website]"></div>
    </fieldset>
    <fieldset string-input="group[avatar]">
      <label for="avatar">Avatar</label>
      <input type="file" name="avatar" string-id="avatar" id="avatar" string-input="mimes(jpg,png,jpeg)|max_size(2048)" />
      <div string-input="error[avatar]"></div>
    </fieldset>
    <fieldset string-input="group[bio]">
      <label for="bio">Bio</label>
      <textarea name="bio" string-id="bio" id="bio" string-input="max(150)" placeholder="Max 150 characters"></textarea>
      <div string-input="error[bio]"></div>
    </fieldset>
    <fieldset string-input="group[age]">
      <label for="age">Age</label>
      <input type="text" name="age" string-id="age" id="age" string-input="integer|range(18,100)" placeholder="Enter your age" />
      <div string-input="error[age]"></div>
    </fieldset>

    <button type="submit">Validate</button>
    <div class="error-summary" string-input="error[global]"></div>
  </form>

  <div id="popup" class="popup" data-string-isolation>
    <pre class="-mm"><code id="popup-code"></code></pre>
  </div>
</div>
  <script>
    const stringTune = StringTune.StringTune.getInstance();
    window.StringTuneContext = stringTune;
      stringTune.use(StringTune.StringForm);

    stringTune.start(0);
  </script>
  
</body>

</html>

  <script>
setTimeout(() => {
  const stringTune = window.StringTuneContext;
  const popup = document.getElementById('popup');
  const popupCode = document.getElementById('popup-code');

  document.addEventListener('keydown', function (event) {
    if (event.key === 'Escape') {
      popup.classList.remove('-opened');
    }
  });

  document.documentElement.addEventListener('click', (e) => {
    popup.classList.remove('-opened');
  });

  stringTune.on('form:submit:validation-demo', (data) => {
    popupCode.innerText = JSON.stringify(data, null, 2);
    popup.classList.add('-opened');
  });
  stringTune.on('form:invalid:validation-demo', () => {});
}, 2000);

</script>
</body>
