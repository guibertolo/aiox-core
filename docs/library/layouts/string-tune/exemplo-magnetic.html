<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exemplo — Magnetic — Cards com Efeito Magnetico</title>
  <script src="https://unpkg.com/@fiddle-digital/string-tune@1.1.53/dist/index.js"></script>
  <style>
@property --progress { syntax: '<number>'; inherits: true; initial-value: 0; }
@property --spotlight-angle { syntax: '<number>'; inherits: true; initial-value: 0; }
@property --spotlight-distance { syntax: '<number>'; inherits: true; initial-value: 0; }

:root {
  --vh: 1vh; --vw: 1vw;
  --c-white: #ffffff; --c-black: #000000; --c-black-rgb: 0, 0, 0;
  --c-grey-dark: #333333; --c-grey-dark-rgb: 51, 51, 51;
  --c-grey: #999999;
  --easing-function: cubic-bezier(0.86, 0, 0.31, 1);
  --easing-function-2: cubic-bezier(0.35, 0.35, 0, 1);
  --g-gap: 0.4rem; --g-margin: calc(var(--g-gap) * 2);
  --mm: 0.64rem; --m: 0.8rem; --p: 1rem;
  --h6: 1.25rem; --h5: 1.563rem; --h4: 1.953rem;
  --h3: 2.441rem; --h2: 3.052rem; --h1: 3.815rem; --h0: 5.065rem;
}
@media (min-width: 1024px) { :root { --g-margin: calc(var(--g-gap) * 4); } }
html, body, * { margin: 0; padding: 0; }
html { font-size: 16px; line-height: 1.25; font-family: Arial, Helvetica, sans-serif; background-color: #808080; color: black; }
@media (min-width: 1024px) { html { font-size: 20px; } }
body { position: relative; min-height: 100lvh; }
img { display: block; width: 100%; height: 100%; object-fit: cover; }

/* Grid 28 colunas para mais flexibilidade */
.-w {
  margin-left: var(--g-margin); margin-right: var(--g-margin);
  display: grid; grid-template-columns: repeat(28, 1fr);
  align-items: center; column-gap: var(--g-gap);
  min-height: calc(var(--vh,1vh) * 100);
  perspective: 80rem;
}

/* Cards com magnetic — seguem o cursor com rotacao 3D */
figure {
  grid-row-start: 1; grid-row-end: 2;
  /* --magnetic-x e --magnetic-y sao injetados pelo StringMagnetic */
  transform: translate(calc(var(--magnetic-x) * 0.5%), calc(var(--magnetic-y) * 0.5%))
    rotateX(calc(var(--magnetic-y) * -0.5deg))
    rotateY(calc(var(--magnetic-x) * 0.5deg));
  scale: 0.9; translate: 0 0; rotate: 0deg;
  transition: scale 0.6s var(--easing-function), rotate 0.6s var(--easing-function), translate 0.6s var(--easing-function);
  border-radius: 0.5rem; overflow: hidden;
}

.image-1 { grid-column-start: 3; grid-column-end: 12; translate: 0 -5%; rotate: -5deg; }
.image-2 { grid-column-start: 10; grid-column-end: 20; position: relative; z-index: 20; rotate: 5deg; }
.image-3 { grid-column-start: 18; grid-column-end: 27; translate: 0 10%; rotate: 10deg; }

@media (min-width: 1024px) {
  figure:hover {
    transition: scale 0.6s var(--easing-function-2), rotate 0.6s var(--easing-function-2), translate 0.6s var(--easing-function-2);
  }
  .image-1 { grid-column-start: 7; grid-column-end: 13; }
  .image-2 { grid-column-start: 12; grid-column-end: 18; }
  .image-3 { grid-column-start: 17; grid-column-end: 23; }

  /* Hover reorganiza os cards */
  .-w:has(figure:hover) .image-1 { translate: -5% 5%; rotate: 5deg; }
  .-w:has(figure:hover) .image-2 { translate: 0 -10%; rotate: 0deg; }
  .-w:has(figure:hover) .image-3 { translate: 5% 0%; rotate: -5deg; }
  .-w:has(figure:hover) figure {
    scale: 0.8;
    transition: scale 0.3s var(--easing-function-2), rotate 0.3s var(--easing-function-2), translate 0.3s var(--easing-function-2);
  }
  .-w:has(figure:hover) figure:hover { scale: 1; }
}

.note {
  grid-row-start: 1; grid-row-end: 2;
  grid-column-start: 1; grid-column-end: 29;
  justify-self: center; position: relative; z-index: 30;
  pointer-events: none; color: var(--c-white);
  font-size: var(--mm); text-transform: uppercase;
}

.footer-note {
  text-align: center; padding: var(--h3) var(--g-margin);
  color: var(--c-grey); font-size: var(--mm);
}
.footer-note a { color: #8b5cf6; text-decoration: none; }
</style>
</head>
<body>
  <div class="-w">
    <!-- string="magnetic" com raio e forca -->
    <figure class="image-1" string="magnetic" string-radius="800" string-strength="0.1">
      <img string="lazy" string-lazy="https://images.unsplash.com/photo-1506929562872-bb421503ef21?w=500&q=80" alt="Praia">
    </figure>
    <figure class="image-2" string="magnetic" string-radius="800" string-strength="0.1">
      <img string="lazy" string-lazy="https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=500&q=80" alt="Montanha">
    </figure>
    <figure class="image-3" string="magnetic" string-radius="800" string-strength="0.1">
      <img string="lazy" string-lazy="https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?w=500&q=80" alt="Lago">
    </figure>
    <span class="note -mm">Mova o mouse sobre as imagens (desktop)</span>
  </div>

  <footer class="footer-note">
    Exemplo — Magnetic via <a href="https://string-tune.fiddle.digital/skill-hub/" target="_blank">StringTune</a>
    | string-radius="800" string-strength="0.1" — cards seguem o cursor com rotacao 3D
  </footer>

  <script>
    const stringTune = StringTune.StringTune.getInstance();
    window.StringTuneContext = stringTune;
    stringTune.use(StringTune.StringLazy);
    stringTune.use(StringTune.StringMagnetic);
    stringTune.start(0);
  </script>
</body>
</html>
